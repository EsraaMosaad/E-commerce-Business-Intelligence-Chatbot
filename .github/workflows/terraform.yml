# ─────────────────────────────────────────────────────────────────────────────
# Group 25fltp — E-commerce BI Chatbot
# GitHub Actions CI/CD for Terraform Infrastructure
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform Infrastructure (25fltp)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: 'us-east-1'
  S3_BUCKET: '25fltp-terraform-state'
  TF_VAR_project: '25fltp-ecom-chatbot'

jobs:
  terraform-validate:
    name: 'Terraform Validate'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (25fltp)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (25fltp)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=ecom-chatbot/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        id: fmt
        working-directory: terraform
        run: |
          terraform fmt -recursive -check
          echo "format_status=passed" >> $GITHUB_OUTPUT

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  terraform-plan:
    name: 'Terraform Plan (PR Review)'
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (25fltp)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_VAR_environment: dev
          TF_VAR_allowed_ip: ${{ secrets.MY_IP }}/32
          TF_VAR_key_name: 25fltp-ecom-key
        run: |
          terraform init \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=ecom-chatbot/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        env:
          TF_VAR_environment: dev
          TF_VAR_allowed_ip: ${{ secrets.MY_IP }}/32
          TF_VAR_key_name: 25fltp-ecom-key
        run: |
          terraform plan -no-color > terraform_plan.txt
          echo "plan_output=$(cat terraform_plan.txt)" >> $GITHUB_OUTPUT
          echo "plan_length=$(wc -l < terraform_plan.txt)" >> $GITHUB_OUTPUT

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/terraform_plan.txt', 'utf8');
            const planLength = parseInt(fs.readFileSync('terraform/terraform_plan.txt', 'utf8').split('\n').length);

            let body = '## Terraform Plan (25fltp-ecom-chatbot)\n\n';
            body += '```\n' + planOutput.slice(-3500) + '\n```\n';
            body += '_Truncated to last 3500 chars (full plan in workflow logs)_';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  terraform-apply:
    name: 'Terraform Apply (Production)'
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (25fltp)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_VAR_environment: production
          TF_VAR_allowed_ip: ${{ secrets.MY_IP }}/32
          TF_VAR_key_name: 25fltp-ecom-key
        run: |
          terraform init \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=ecom-chatbot/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        id: apply
        working-directory: terraform
        env:
          TF_VAR_environment: production
          TF_VAR_allowed_ip: ${{ secrets.MY_IP }}/32
          TF_VAR_key_name: 25fltp-ecom-key
        run: |
          terraform apply -auto-approve
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "openwebui_url=$(terraform output -raw openwebui_url)" >> $GITHUB_OUTPUT
          echo "emr_cluster_id=$(terraform output -raw emr_cluster_id)" >> $GITHUB_OUTPUT

      - name: Display Deployment Info
        run: |
          echo "=== 25fltp E-commerce BI Chatbot Deployment ==="
          echo "EC2 Public IP: ${{ steps.apply.outputs.ec2_public_ip }}"
          echo "OpenWebUI URL: ${{ steps.apply.outputs.openwebui_url }}"
          echo "EMR Cluster ID: ${{ steps.apply.outputs.emr_cluster_id }}"
          echo "S3 Model Path: s3://25fltp-ecom-chatbot/model/tinyllama-chat.Q4_K_M.gguf"

      - name: Create deployment summary
        run: |
          cat > deployment_summary.md << 'EOF'
          # Deployment Summary — Group 25fltp

          ## Resources Created
          - VPC: 10.0.0.0/16
          - Public Subnet: 10.0.1.0/24
          - EMR Cluster: emr-7.1.0 (Spark + JupyterHub + Hadoop)
          - EC2 Instance: t3.large (100GB root volume)
          - S3 Bucket: 25fltp-ecom-chatbot (versioned, public access blocked)
          - Security Groups: 25fltp-ec2-sg, 25fltp-emr-sg
          - IAM Roles: 25fltp-ec2-s3-role, 25fltp-emr-role

          ## Next Steps
          1. Upload GGUF model to: s3://25fltp-ecom-chatbot/model/
          2. SSH to EC2: ssh -i 25fltp-ecom-key.pem ubuntu@<ec2_public_ip>
          3. Test OpenWebUI: http://<ec2_public_ip>:3000
          4. Submit Spark job to EMR using master DNS
          EOF

  terraform-destroy:
    name: 'Terraform Destroy (Branch Cleanup)'
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (25fltp)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Destroy
        working-directory: terraform
        env:
          TF_VAR_key_name: 25fltp-ecom-key
        run: |
          terraform init \
            -backend-config="bucket=${{ env.S3_BUCKET }}" \
            -backend-config="key=ecom-chatbot/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform destroy -auto-approve